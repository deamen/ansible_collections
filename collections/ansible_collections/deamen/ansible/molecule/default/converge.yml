---
- name: Install Ansible via system package manager
  hosts: all:!localhost
  become: true

  tasks:
    - name: Install Ansible and dependencies
      ansible.builtin.include_role:
        name: deamen.ansible.install_system_ansible

    - name: Install development packages
      ansible.builtin.include_role:
        name: deamen.general.install_dev_packages


- name: Test deamen.general.config_dev_runtime_env plabook
  ansible.builtin.import_playbook: ../../playbooks/configure_system_ansible_runtime_env.yml
