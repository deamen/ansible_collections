---
- name: Configure GPG for test user
  hosts: containers
  become: true
  vars:
    _molecule_test_user: testuser
    _molecule_test_fingerprint: '58E9E1EDCDF7B0B801849FB61E8C4D240EE0E2E2'

  tasks:
    - name: Configure passwordless sudo for become operations
      ansible.builtin.copy:
        content: 'ALL ALL=(ALL) NOPASSWD: ALL'
        dest: /etc/sudoers.d/molecule
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: Create test user
      ansible.builtin.user:
        name: '{{ _molecule_test_user }}'
        state: present
        create_home: true

    - name: Install GPG packages
      ansible.builtin.include_role:
        name: deamen.gpg.install_gpg

    - name: Ensure .gnupg directory exists for test user
      ansible.builtin.file:
        group: '{{ _molecule_test_user }}'
        mode: '0700'
        owner: '{{ _molecule_test_user }}'
        path: '/home/{{ _molecule_test_user }}/.gnupg'
        state: directory

    - name: Check if GPG key is already imported
      ansible.builtin.command:
        cmd: 'gpg --list-secret-keys --with-colons {{ _molecule_test_fingerprint }}'
      become: true
      become_method: ansible.builtin.sudo
      become_user: '{{ _molecule_test_user }}'
      changed_when: false
      failed_when: false
      register: _molecule_gpg_key_check

    - name: Copy test GPG private key to container
      ansible.builtin.copy:
        dest: '/home/{{ _molecule_test_user }}/.gnupg/private_gpg.key'
        group: '{{ _molecule_test_user }}'
        mode: '0600'
        owner: '{{ _molecule_test_user }}'
        src: '{{ playbook_dir }}/test-ed25519-secret.asc'
      when: _molecule_gpg_key_check.rc != 0

    - name: Configure GPG for test user
      ansible.builtin.include_role:
        name: deamen.gpg.config_gpg
      vars:
        config_gpg_fingerprint: '{{ _molecule_test_fingerprint }}'
        config_gpg_user: '{{ _molecule_test_user }}'
