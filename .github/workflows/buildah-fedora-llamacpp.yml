name: Test build llama on fedora

on:
  push:
    paths:
      - 'collections/ansible_collections/deamen/ai/playbooks/buildah_fedora-llamacpp.yml'
  pull_request:
    paths:
      - 'collections/ansible_collections/deamen/ai/playbooks/buildah_fedora-llamacpp.yml'

jobs:
  run-playbook:
    name: Run buildah_fedora-llamacpp playbook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Test buildah_fedora-llamacpp playbook
        run: |
          ansible-playbook -i localhost, \
            collections/ansible_collections/deamen/ai/playbooks/buildah_fedora-llamacpp.yml
