name: Release deamen.general

on:
  push:
    tags:
      - 'release_deamen.general_v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    uses: ./.github/workflows/ansible_collection_base_workflow.yml
    with:
      collection_path: collections/ansible_collections/deamen/general
    secrets:
      ANSIBLE_GALAXY_APIKEY: ${{ secrets.ANSIBLE_GALAXY_APIKEY }}
