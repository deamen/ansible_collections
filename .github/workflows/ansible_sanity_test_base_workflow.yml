name: Ansible Sanity Test Base Workflow

on:
  workflow_call:
    inputs:
      collection_name:
        required: true
        type: string
        description: "The name of the collection to test"

jobs:
  ansible-test-sanity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-test
        run: |
          python3 -m pip install --upgrade pip
          pip3 install ansible-core

      - name: Run ansible-test sanity
        working-directory: collections/ansible_collections/deamen/${{ inputs.collection_name }}
        run: |
          ansible-test sanity --docker --python ${{ matrix.python-version }}
